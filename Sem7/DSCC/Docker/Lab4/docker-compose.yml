version: "3.9"

services:
  db:
    image: postgres:16
    container_name: testdb
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: db-connector-app
    depends_on:
      - db
    environment:
      DB_HOST: db          
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: secret
      DB_NAME: mydb
    ports:
      - "8080:8080"